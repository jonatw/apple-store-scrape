name: Apple Price Scraper

on:
  workflow_dispatch:
  schedule:
    - cron: '0 0 * * *'  # Daily at midnight UTC

jobs:
  scrape:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.12'

      - name: Install Dependencies
        run: |
          python -m pip install --upgrade pip
          pip install requests beautifulsoup4 pandas matplotlib seaborn

      - name: Run All Apple Product Scrapers
        run: python apple_scraper_manager.py run-all --parallel --timeout 25

      - name: Convert CSV to JSON for Web Display
        run: python convert_to_json.py

      - name: List Generated Files (Debug)
        run: ls -la *.csv *.json *.png || echo "No files generated"

      - name: Upload Results
        if: success()
        uses: actions/upload-artifact@v4
        with:
          name: apple-products-comparison
          path: |
            *_products_merged.csv
            *_data.json
            price_diff.png
            index.json
