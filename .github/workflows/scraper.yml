name: Apple Price Scraper

on:
  workflow_dispatch:
  schedule:
    - cron: '0 0 * * *'  # Daily at midnight UTC

jobs:
  scrape:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.12'

      - name: Install Dependencies
        run: |
          python -m pip install --upgrade pip
          pip install requests beautifulsoup4 pandas

      - name: Run iPhone Scraper
        run: python iphone.py

      - name: Upload Results
        if: success()
        uses: actions/upload-artifact@v4
        with:
          name: iphone-prices
          path: iphone_products_merged.csv
